name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'
      - run: gradle build
      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp Fabric/build/libs/${mod_id}-fabric-*.jar release/ 2>/dev/null || true
          cp Forge/build/libs/${mod_id}-forge-*.jar release/ 2>/dev/null || true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          draft: false
          prerelease: false
